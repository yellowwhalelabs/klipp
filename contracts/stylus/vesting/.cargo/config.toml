# Stylus WASM build flags — REQUIRED for `cargo stylus check`/`deploy`.
#
# -zstack-size=32768        : 32 KB stack (Stylus VM constraint)
# target-feature=-reference-types : Stylus does NOT support the WASM reference-
#                             types proposal; rustc >= 1.82 emits it by default,
#                             so it must be explicitly disabled or `cargo stylus
#                             check` rejects the module.
# target-feature=+bulk-memory : allowed and used by the Stylus allocator.
#
# Mirrors OffchainLabs/stylus-hello-world/.cargo/config.toml.
[target.wasm32-unknown-unknown]
rustflags = [
  "-C", "link-arg=-zstack-size=32768",
  "-C", "target-feature=-reference-types",
  "-C", "target-feature=+bulk-memory",
]

[target.aarch64-apple-darwin]
rustflags = [
  "-C", "link-arg=-undefined",
  "-C", "link-arg=dynamic_lookup",
]

[target.x86_64-apple-darwin]
rustflags = [
  "-C", "link-arg=-undefined",
  "-C", "link-arg=dynamic_lookup",
]
