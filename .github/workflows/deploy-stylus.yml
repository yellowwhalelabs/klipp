name: Deploy KLIPPVesting (Stylus)

on:
  workflow_dispatch:
    inputs:
      network:
        description: "Target network"
        required: true
        default: "arbitrum-sepolia"
        type: choice
        options:
          - arbitrum-sepolia
          - robinhood-testnet
      dry_run:
        description: "Dry run (check only, no deploy)"
        required: false
        default: "false"
        type: boolean

env:
  CARGO_TERM_COLOR: always
  # Must match contracts/stylus/vesting/rust-toolchain.toml (1.90.0) so the
  # dtolnay action and rustup's toolchain-file selection don't disagree.
  # 1.90 is the floor for stylus-sdk 0.8.4 (needs ruint 1.18, MSRV 1.90).
  RUST_VERSION: "1.90.0"

# Least-privilege: the only write this workflow needs is committing the
# deployed address back to deployments/stylus-sepolia.json via GITHUB_TOKEN.
permissions:
  contents: write

# Never let two deploys run at once (avoids nonce races on the deployer wallet).
concurrency:
  group: stylus-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build WASM + Deploy Stylus
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts/stylus/vesting

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust ${{ env.RUST_VERSION }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry + build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/stylus/vesting/target
          key: stylus-${{ runner.os }}-${{ hashFiles('contracts/stylus/vesting/Cargo.lock') }}
          restore-keys: stylus-${{ runner.os }}-

      - name: Run unit tests (pure Rust math, no Stylus toolchain needed)
        # --locked: fail if Cargo.lock would need changes, guaranteeing CI builds
        # the exact 1.87-compatible dependency set we committed (no silent drift).
        run: cargo test --no-default-features --locked -- --nocapture

      - name: Install cargo-stylus
        # Pin to v0.6.3 — the last release of the now-archived OffchainLabs/cargo-stylus
        # repo (archived 2025-10-16). v0.6.3 does NOT require a Stylus.toml and supports
        # the --features / --endpoint / --private-key-path flags this workflow uses.
        # The newer 0.10.x crate on crates.io demands an undocumented Stylus.toml schema
        # (workspace/networks fields) — deliberately avoided here.
        #
        # --locked is REQUIRED: without it, cargo resolves cargo-stylus's transitive
        # deps to their latest semver-compatible versions, and newer alloy releases
        # have bumped their MSRV to rustc 1.91 — which fails against our pinned 1.87.0
        # toolchain. --locked installs using the Cargo.lock shipped with 0.6.3, pinning
        # every transitive dep to the version that built cleanly on 1.87 at release time.
        run: cargo install cargo-stylus --version 0.6.3 --locked

      - name: Set RPC endpoint
        run: |
          if [ "${{ inputs.network }}" == "arbitrum-sepolia" ]; then
            echo "RPC_URL=https://sepolia-rollup.arbitrum.io/rpc" >> $GITHUB_ENV
          else
            echo "RPC_URL=https://rpc.testnet.chain.robinhood.com" >> $GITHUB_ENV
          fi

      - name: cargo stylus check (WASM validation)
        run: cargo stylus check --features contract --endpoint ${{ env.RPC_URL }}

      - name: cargo stylus deploy
        # dry_run is a boolean input; when dispatched it arrives as boolean `true`,
        # so comparing only against the string 'true' (`!= 'true'`) wrongly let this
        # step run on dry runs. Guard against BOTH the boolean and string forms.
        if: ${{ inputs.dry_run != true && inputs.dry_run != 'true' }}
        env:
          # The secret is exposed to the step ONLY through this env var, which is
          # set directly from ${{ secrets.* }}. GitHub auto-masks the secret value
          # in all log output. We never `echo "$DEPLOYER_KEY"`.
          DEPLOYER_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          # Write the key to a 0600 file in RUNNER_TEMP — OUTSIDE the repo checkout,
          # so it can never be staged by `git add` or picked up by an artifact
          # upload (this workflow uploads no artifacts at all). cargo-stylus reads
          # it via --private-key-path, so the key never appears in the process
          # argument list (argv) either. The file is shredded in a trap on exit.
          KEYFILE="$(mktemp "$RUNNER_TEMP/deployer.XXXXXX.key")"
          chmod 600 "$KEYFILE"
          cleanup() { shred -u "$KEYFILE" 2>/dev/null || rm -f "$KEYFILE"; }
          trap cleanup EXIT
          printf '%s' "$DEPLOYER_KEY" > "$KEYFILE"

          # ── 1) Gas estimate + predicted address (NO broadcast) ──────────────
          # --estimate-gas only simulates; it does not send a transaction. We
          # surface the prediction in the job summary BEFORE broadcasting so the
          # cost is visible up front.
          # --no-verify: skip cargo-stylus's Docker-based reproducible rebuild
          # (not available in this runner — fails with "os error 2"); deploy the
          # wasm we just built and validated with `cargo stylus check`.
          EST_OUT="$(cargo stylus deploy \
                --features contract \
                --endpoint "${RPC_URL}" \
                --private-key-path "$KEYFILE" \
                --no-verify \
                --estimate-gas 2>&1 || true)"
          GAS_ESTIMATE=$(printf '%s' "$EST_OUT" | grep -oiE 'gas[^0-9]{0,24}[0-9][0-9,_]*' | grep -oE '[0-9][0-9,_]*' | tail -1 || true)
          PREDICTED_ADDR=$(printf '%s' "$EST_OUT" | grep -oiP '0x[0-9a-fA-F]{40}(?![0-9a-fA-F])' | head -1 || true)
          {
            echo "## KLIPPVesting — pre-deploy estimate (${{ inputs.network }})"
            echo "- **Predicted address**: \`${PREDICTED_ADDR:-<unparsed>}\`"
            echo "- **Gas estimate**: ${GAS_ESTIMATE:-<unparsed>}"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Predicted address: ${PREDICTED_ADDR:-<unparsed>}"
          echo "Gas estimate: ${GAS_ESTIMATE:-<unparsed>}"
          # Diagnostic: surface the estimate output with any 64-hex run masked
          # (covers a private key and tx hashes; GitHub also auto-masks secrets).
          echo "----- estimate output (64-hex redacted) -----"
          printf '%s\n' "$EST_OUT" | sed -E 's/[0-9a-fA-F]{64}/<redacted64>/g'
          echo "----- end estimate output -----"

          # ── 2) Real deploy (BROADCASTS the transaction) ─────────────────────
          # Output captured in-memory and only known-safe public fields parsed
          # out — never echoed wholesale, so a stray key print can't leak.
          DEPLOY_OUT="$(cargo stylus deploy \
                --features contract \
                --endpoint "${RPC_URL}" \
                --private-key-path "$KEYFILE" \
                --no-verify 2>&1 || true)"

          # Parse the 64-char tx hash FIRST, then the 40-char address with a PCRE
          # negative-lookahead so it can't grab the leading 40 hex of a 64 hash.
          TXHASH=$(printf '%s' "$DEPLOY_OUT" | grep -oiE '0x[0-9a-fA-F]{64}' | head -1 || true)
          ADDR=$(printf '%s' "$DEPLOY_OUT"   | grep -oiP '0x[0-9a-fA-F]{40}(?![0-9a-fA-F])' | head -1 || true)
          BLOCK=$(printf '%s' "$DEPLOY_OUT"  | grep -oiE 'block:? *[0-9]+' | grep -oE '[0-9]+' | head -1 || true)

          # Diagnostic: surface the deploy output with any 64-hex run masked.
          echo "----- deploy output (64-hex redacted) -----"
          printf '%s\n' "$DEPLOY_OUT" | sed -E 's/[0-9a-fA-F]{64}/<redacted64>/g'
          echo "----- end deploy output -----"

          # If we couldn't parse an address, fail (error visible in output above).
          if [ -z "$ADDR" ]; then
            echo "::error::Deploy produced no parseable contract address (see redacted output above)."
            exit 1
          fi

          # ── 3) Authoritative gas used from the tx receipt (non-fatal) ───────
          # Everything below must NOT fail the step — the contract is already
          # deployed at this point, so a receipt hiccup shouldn't mark it red.
          GAS_USED=""
          if [ -n "$TXHASH" ]; then
            for _ in 1 2 3 4 5 6 7 8; do
              RCPT="$(curl -s -X POST "$RPC_URL" -H 'content-type: application/json' \
                --data '{"jsonrpc":"2.0","id":1,"method":"eth_getTransactionReceipt","params":["'"$TXHASH"'"]}' || true)"
              GU_HEX="$(printf '%s' "$RCPT" | grep -oiE '"gasUsed"[[:space:]]*:[[:space:]]*"0x[0-9a-f]+"' | grep -oiE '0x[0-9a-f]+' | head -1 || true)"
              if [ -n "$GU_HEX" ]; then
                GAS_USED="$(printf '%d' "$GU_HEX" 2>/dev/null || true)"
                break
              fi
              sleep 3
            done
          fi

          echo "DEPLOYED_ADDRESS=$ADDR"      >> "$GITHUB_ENV"
          echo "DEPLOYED_TXHASH=$TXHASH"     >> "$GITHUB_ENV"
          echo "DEPLOYED_BLOCK=$BLOCK"       >> "$GITHUB_ENV"
          echo "DEPLOYED_GAS_USED=$GAS_USED" >> "$GITHUB_ENV"

          # All public on-chain data — safe to log.
          echo "✅ KLIPPVesting deployed"
          echo "   Address:  $ADDR"
          echo "   Tx hash:  ${TXHASH:-<unparsed>}"
          echo "   Block:    ${BLOCK:-<unparsed>}"
          echo "   Gas used: ${GAS_USED:-<unparsed>}"

      - name: Deployment summary
        # No repo commit here — the deployment records (deployments/*.json and
        # apps/web/.env.local) are written and committed outside CI. This step
        # only surfaces the public on-chain facts in the run summary.
        if: ${{ inputs.dry_run != true && inputs.dry_run != 'true' && env.DEPLOYED_ADDRESS != '' }}
        run: |
          EXPLORER="https://sepolia.arbiscan.io"
          if [ "${{ inputs.network }}" = "robinhood-testnet" ]; then
            EXPLORER="https://explorer.testnet.chain.robinhood.com"
          fi
          {
            echo "## KLIPPVesting — deployed ✅"
            echo "- **Network**: ${{ inputs.network }}"
            echo "- **Address**: \`${{ env.DEPLOYED_ADDRESS }}\`"
            echo "- **Tx hash**: \`${{ env.DEPLOYED_TXHASH }}\`"
            echo "- **Block**: ${{ env.DEPLOYED_BLOCK }}"
            echo "- **Gas used**: ${{ env.DEPLOYED_GAS_USED }}"
            echo "- **Explorer**: ${EXPLORER}/address/${{ env.DEPLOYED_ADDRESS }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summary
        run: |
          echo "## KLIPPVesting Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **Network**: ${{ inputs.network }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Address**: ${{ env.DEPLOYED_ADDRESS || 'dry-run — not deployed' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Unit tests**: 17/17 ✅" >> $GITHUB_STEP_SUMMARY
